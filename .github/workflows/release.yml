name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            asset_name: teul-linux-x86_64
          - target: aarch64-linux
            os: ubuntu-latest
            asset_name: teul-linux-aarch64
          - target: x86_64-macos
            os: macos-latest
            asset_name: teul-macos-x86_64
          - target: aarch64-macos
            os: macos-latest
            asset_name: teul-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: mlugg/setup-zig@v1
        with:
          version: master

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}
        
      - name: Rename and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv zig-out/bin/teul ${{ matrix.asset_name }}
          gh release upload ${{ github.event.release.tag_name }} ${{ matrix.asset_name }}
